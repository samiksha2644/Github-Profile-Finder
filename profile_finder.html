<!DOCTYPE html>
<html>
<head>
  <title>GitHub Finder</title>
  <style>
    body {
      background: #0d1117;
      font-family: Arial;
      text-align: center;
      color: white;
      padding-top: 50px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #238636;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card {
      background: #161b22;
      margin: 30px auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    img {
      width: 120px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

<h1>GitHub Profile Finder</h1>

<input type="text" id="username" placeholder="Enter username">
<button onclick="getUser()">Search</button>

<div id="card"></div>

<script>
function getUser() {
  const username = document.getElementById("username").value;

  fetch(`https://api.github.com/users/${username}`)
    .then(res => {
      if (!res.ok) throw new Error("User not found");
      return res.json();
    })
    .then(data => {
      document.getElementById("card").innerHTML = `
        <div class="card">
          <img src="${data.avatar_url}">
          <h2>${data.name || "No Name"}</h2>
          <p>@${data.login}</p>
          <p>Followers: ${data.followers}</p>
          <p>Following: ${data.following}</p>
          <p>Public Repos: ${data.public_repos}</p>
          <a href="${data.html_url}" target="_blank">Visit Profile</a>
        </div>
      `;
    })
    .catch(err => {
      document.getElementById("card").innerHTML = `<p>User not found</p>`;
    });
}
</script>

</body>
</html>
